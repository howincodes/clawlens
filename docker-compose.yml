# NOTE: If you use a reverse proxy (e.g. nginx) in front of ClawLens,
# you MUST forward WebSocket upgrade headers for the watcher real-time
# connection to work. Add these directives to your nginx location block:
#
#   location / {
#       proxy_pass http://127.0.0.1:3000;
#       proxy_http_version 1.1;
#       proxy_set_header Upgrade $http_upgrade;
#       proxy_set_header Connection "upgrade";
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#       proxy_read_timeout 86400;
#   }

services:
  clawlens:
    build: .
    container_name: clawlens
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - clawlens-data:/app/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - PORT=3000
      - DB_PATH=/app/data/clawlens.db

volumes:
  clawlens-data:
