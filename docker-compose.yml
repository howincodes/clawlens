services:
  clawlens:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - clawlens-data:/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - DB_PATH=/data/clawlens.db
      - PORT=3000
      - CLAWLENS_MODE=${CLAWLENS_MODE:-selfhost}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  clawlens-data:
  caddy-data:
  caddy-config:
