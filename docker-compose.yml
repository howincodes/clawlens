# Standard docker-compose — exposes port 3000 directly.
# Use this when you have an existing reverse proxy (nginx, Traefik, etc.)
# or for local development.
#
# For auto-HTTPS with Caddy (recommended for standalone deployments), use:
#   docker compose -f docker-compose.caddy.yml up -d
#
# NOTE: If you use a reverse proxy in front of ClawLens, forward WebSocket
# upgrade headers for real-time features. The dashboard will automatically
# fall back to HTTP polling if WebSocket is unavailable.
#
# Example nginx config for the /ws path:
#
#   location /ws {
#       proxy_pass http://127.0.0.1:3000;
#       proxy_http_version 1.1;
#       proxy_set_header Upgrade $http_upgrade;
#       proxy_set_header Connection "upgrade";
#       proxy_read_timeout 86400;
#   }

services:
  clawlens:
    build: .
    container_name: clawlens
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - clawlens-data:/app/data
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - PORT=3000
      - DB_PATH=/app/data/clawlens.db

volumes:
  clawlens-data:
